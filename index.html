<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>James Sevilla | Portfolio</title>
  
  <style>
    /* ==========================================================================
       FONTS & VARIABLES
       ========================================================================== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-color: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
      --blue-accent: #3b82f6;
      --card-dark: #1f2937;
      --btn-light-bg: #ffffff;
      --btn-light-hover: #f9fafb;
      --list-border: #f3f4f6;
      --badge-bg: #eff6ff;
      --badge-text: #1d4ed8;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    [data-theme="dark"] {
      --bg-color: #111827;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --border-color: #374151;
      --card-dark: #1f2937; 
      --btn-light-bg: #1f2937;
      --btn-light-hover: #374151;
      --list-border: #1f2937;
      --badge-bg: #1e3a8a;
      --badge-text: #93c5fd;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    a { color: inherit; text-decoration: none; }

    .container { max-width: 1000px; margin: 0 auto; padding: 4rem 2rem; }
    .grid-2-col { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 4rem; margin-bottom: 4rem; }
    .grid-2-col-even { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; margin-bottom: 4rem; }

    .theme-toggle {
      position: fixed; top: 1.5rem; right: 2rem;
      background-color: var(--btn-light-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      z-index: 100;
    }

    .icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }
    
    .profile-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem; }
    .avatar { width: 120px; height: 120px; border-radius: 8px; background-color: #f3f4f6; object-fit: cover; }
    .btn { padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
    .btn-dark { background-color: var(--text-main); color: var(--bg-color); }
    .btn-light { background-color: var(--btn-light-bg); border: 1px solid var(--border-color); }
    
    .dark-card { background: linear-gradient(135deg, #1f2937, #111827); border-radius: 12px; padding: 2rem; color: white; min-height: 350px; }
    .list-item { padding: 1rem 0; border-bottom: 1px solid var(--list-border); }
    footer { text-align: center; padding-top: 4rem; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; }

    @media (max-width: 768px) {
      .grid-2-col, .grid-2-col-even { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
    <svg id="moon-icon" class="icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    <svg id="sun-icon" class="icon" viewBox="0 0 24 24" style="display: none;"><circle cx="12" cy="12" r="5"></circle></svg>
  </button>

  <main class="container">
    <header class="profile-header">
      <img src="profile.jpg" alt="James Sevilla" class="avatar">
      <div class="profile-info">
        <h1>James Sevilla</h1>
        <p>CS Student \ Web Developer</p>
        <div class="actions">
          <button class="btn btn-dark" onclick="window.location.href='mailto:your@email.com'">Schedule a Call</button>
          <button class="btn btn-light" onclick="window.location.href='https://github.com/yourusername'">GitHub</button>
        </div>
      </div>
    </header>

    <div class="grid-2-col-even">
      <section>
        <h2>Projects</h2>
        <div class="list-item">
          <a href="http://james-taskpulse.free.nf" target="_blank">
            <h3>TaskPulse | Developer Dashboard [ Test Live App ↗ ]</h3>
          </a>
        </div>
      </section>
    </div>
  </main>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const moonIcon = document.getElementById('moon-icon');
    const sunIcon = document.getElementById('sun-icon');

    // Apply theme on load
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      moonIcon.style.display = 'none';
      sunIcon.style.display = 'block';
    }

    toggleBtn.addEventListener('click', () => {
      if (document.documentElement.getAttribute('data-theme') === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        moonIcon.style.display = 'block';
        sunIcon.style.display = 'none';
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        moonIcon.style.display = 'none';
        sunIcon.style.display = 'block';
      }
    });
  </script>
</body>
</html>
